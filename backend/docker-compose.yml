version: '3.8'

services:
  postgres_dev:
    image: postgres:16-alpine
    container_name: pern_postgres_dev
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    networks:
      - pern_network

volumes:
  postgres_dev_data:

networks:
  pern_network: